name: Update Aviation Weather Charts

on:
  schedule:
    # 1時間ごとに実行 (毎時0分)
    - cron: '0 * * * *'
  workflow_dispatch:
    # 手動実行ボタンを有効化
  push:
    branches:
      - main
    paths:
      - 'update_weather.py'

jobs:
  update-charts:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # リポジトリへの書き込み権限を許可

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils  # pdf2imageに必要なライブラリ
          pip install -r requirements.txt

      - name: Run update script
        run: python update_weather.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add images/*.png images/*.pdf
          # 変更がある場合のみコミット
          if ! git diff --cached --quiet; then
            git commit -m "Update weather charts: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes to commit"
          fi
