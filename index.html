    async function generateView() {
        const icao = document.getElementById('icao').value.toUpperCase();
        const resultDiv = document.getElementById('result');
        const genBtn = document.getElementById('gen-btn');

        if (icao.length < 4) return alert("ICAOコードを入力してください。");

        resultDiv.innerHTML = '<div class="loading">Generating Briefing Charts...</div>';
        genBtn.disabled = true;
        currentImages = [];

        // フォールバック（未定義エラー回避）を含めて設定をロード
        const config = airportConfig[icao] || { fbos: [], ash: [], pdfs: [] };
        
        const targetList = [
            ...commonCharts.map(c => ({ title: c.title, url: `images/${c.file}` })),
            ...config.fbos.map(f => {
                let fbosTitle = "下層悪天予想図";
                if (f.includes("06")) fbosTitle = "下層悪天予想図 6時間予想";
                if (f.includes("39")) fbosTitle = "下層悪天予想図 時系列予想";
                return { title: fbosTitle, url: `images/${f}` };
            }),
            ...config.ash.map(a => ({ title: "降灰予想図", url: `images/${a}` })),
            
            // データ構造から動的にPDFを読み込んでターゲットリストに追加
            ...(config.pdfs || []).map(p => ({ title: "短期解説資料", url: `images/${p}`, isPdf: true })),

            { title: "飛行場時系列予報 Part1", url: `${WORKER_URL}/?icao=${icao}&type=QMCD98` },
            { title: "飛行場時系列予報 Part2", url: `${WORKER_URL}/?icao=${icao}&type=QMCJ98` }
        ];

        resultDiv.innerHTML = "";

        for (const item of targetList) {
            try {
                const res = await fetch(item.url);
                if (!res.ok) continue;

                const blob = await res.blob();
                const objUrl = URL.createObjectURL(blob);
                
                // PDFは画像一括ダウンロード処理の対象から除外する
                if (!item.isPdf) {
                    currentImages.push({ title: item.title, blob: blob });
                }

                const card = document.createElement('div');
                card.className = 'card';
                
                // データの種類（画像かPDFか）に応じてHTMLタグを分岐切り替え
                if (item.isPdf) {
                    card.innerHTML = `
                        <h3>${item.title} <span style="font-size:12px; color:#999;">${icao}</span></h3>
                        <iframe src="${objUrl}" class="chart-pdf" type="application/pdf"></iframe>
                    `;
                } else {
                    card.innerHTML = `
                        <h3>${item.title} <span style="font-size:12px; color:#999;">${icao}</span></h3>
                        <img src="${objUrl}" class="chart-img" alt="${item.title}">
                    `;
                }
                resultDiv.appendChild(card);
            } catch (e) {
                console.error("Load failed:", item.url);
            }
        }

        if (currentImages.length === 0 && resultDiv.children.length === 0) {
            resultDiv.innerHTML = '<div class="error-msg">有効なデータが見つかりませんでした。</div>';
        }
        genBtn.disabled = false;
    }

    async function downloadAllAsPDF() {
        if (currentImages.length === 0) {
            return alert("先に「Generate View」を実行して画像を取得してください。");
        }

        const overlay = document.getElementById('pdf-overlay');
        overlay.style.display = 'flex';

        await new Promise(resolve => setTimeout(resolve, 50));

        try {
            const icao = document.getElementById('icao').value.toUpperCase();
            const { PDFDocument } = PDFLib;
            const pdfDoc = await PDFDocument.create();

            for (const item of currentImages) {
                try {
                    const imgBytes = await item.blob.arrayBuffer();
                    const img = await pdfDoc.embedPng(imgBytes);

                    const { width, height } = img.scale(1);
                    const isLandscape = width > height;
                    const pageWidth = isLandscape ? 842 : 595;
                    const pageHeight = isLandscape ? 595 : 842;

                    const page = pdfDoc.addPage([pageWidth, pageHeight]);

                    const margin = 5; 
                    const maxW = pageWidth - margin * 2;
                    const maxH = pageHeight - margin * 2;

                    const ratio = Math.min(maxW / width, maxH / height);
                    const drawW = width * ratio;
                    const drawH = height * ratio;

                    page.drawImage(img, {
                        x: (pageWidth - drawW) / 2,
                        y: (pageHeight - drawH) / 2,
                        width: drawW,
                        height: drawH
                    });
                } catch (e) { console.warn("PDF Embed Error", e); }
            }

            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `BriefHub_WX_${icao}.pdf`;
            link.click();

        } catch (error) {
            console.error(error);
            alert("PDF生成中にエラーが発生しました。");
        } finally {
            overlay.style.display = 'none';
        }
    }
